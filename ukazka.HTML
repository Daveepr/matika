<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Ukázka příkladu</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 30px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }
    #info {
      margin-bottom: 15px;
      font-size: 18px;
    }
    #board {
      background: #000;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      display: block;
    }
    .btn-row {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .back-btn {
      background: #2e7d32;
      color: #fff;
    }
    .back-btn:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>
  <h1>Ukázka příkladu</h1>
  <div id="info"></div>
  <canvas id="board" width="900" height="400"></canvas>

  <div class="btn-row">
    <button class="back-btn" onclick="window.location.href='index.html'">Zpět</button>
  </div>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    // základní vzhled "křídy"
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 6;
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bézier sampling
    function sampleBezier(p0, p1, p2, p3, samples = 120) {
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const mt = 1 - t;
        const x =
          mt * mt * mt * p0[0] +
          3 * mt * mt * t * p1[0] +
          3 * mt * t * t * p2[0] +
          t * t * t * p3[0];
        const y =
          mt * mt * mt * p0[1] +
          3 * mt * mt * t * p1[1] +
          3 * mt * t * t * p2[1] +
          t * t * t * p3[1];
        pts.push([x, y]);
      }
      return pts;
    }

    // realistické tvary číslic 0–9 + "-"
    const digitPaths = {
      "0": [
        sampleBezier([25,5],[40,5],[45,20],[45,25],80),
        sampleBezier([45,25],[45,35],[35,45],[25,45],80),
        sampleBezier([25,45],[10,45],[5,30],[5,25],80),
        sampleBezier([5,25],[5,15],[15,5],[25,5],80)
      ],

      "1": [
        sampleBezier([18,15],[22,8],[26,5],[28,10],80),
        sampleBezier([28,10],[28,25],[28,35],[28,45],120),
        sampleBezier([18,45],[23,48],[33,48],[38,45],60)
      ],

      "2": [
        sampleBezier([10,20],[15,8],[30,5],[40,12],120),
        sampleBezier([40,12],[45,20],[38,28],[25,33],120),
        sampleBezier([25,33],[15,37],[10,42],[45,42],80)
      ],

      "3": [
        sampleBezier([12,15],[20,7],[30,5],[38,10],80),
        sampleBezier([38,10],[44,15],[42,23],[32,26],80),
        sampleBezier([32,26],[42,29],[45,37],[40,43],80),
        sampleBezier([40,43],[33,48],[23,48],[15,43],80)
      ],

      "4": [
        sampleBezier([35,5],[35,20],[35,30],[35,45],120),
        sampleBezier([10,25],[22,23],[30,23],[35,25],80),
        sampleBezier([10,5],[10,15],[10,20],[10,25],80)
      ],

      "5": [
        sampleBezier([40,8],[25,5],[15,5],[10,8],80),
        sampleBezier([10,8],[8,15],[8,20],[10,23],60),
        sampleBezier([10,23],[20,22],[30,23],[38,27],80),
        sampleBezier([38,27],[45,32],[42,42],[34,46],80),
        sampleBezier([34,46],[25,49],[17,47],[11,42],80)
      ],

      "6": [
        sampleBezier([35,10],[28,5],[20,6],[14,11],80),
        sampleBezier([14,11],[9,18],[8,26],[10,34],80),
        sampleBezier([10,34],[13,42],[20,47],[28,47],80),
        sampleBezier([28,47],[36,46],[40,40],[40,34],80),
        sampleBezier([40,34],[39,28],[34,24],[26,23],80),
        sampleBezier([26,23],[18,23],[14,26],[12,30],60)
      ],

      "7": [
        sampleBezier([8,10],[25,7],[35,7],[42,8],80),
        sampleBezier([42,8],[35,20],[28,32],[20,45],120)
      ],

      "8": [
        sampleBezier([25,10],[32,8],[38,12],[38,18],80),
        sampleBezier([38,18],[38,24],[32,28],[25,29],80),
        sampleBezier([25,29],[18,28],[12,24],[12,18],80),
        sampleBezier([12,18],[12,12],[18,8],[25,10],80),
        sampleBezier([25,29],[33,30],[39,35],[39,41],80),
        sampleBezier([39,41],[39,47],[33,50],[25,50],80),
        sampleBezier([25,50],[17,50],[11,47],[11,41],80),
        sampleBezier([11,41],[11,35],[17,30],[25,29],80)
      ],

      "9": [
        sampleBezier([25,10],[32,8],[38,12],[38,18],80),
        sampleBezier([38,18],[38,24],[32,28],[25,29],80),
        sampleBezier([25,29],[18,28],[12,24],[12,18],80),
        sampleBezier([12,18],[12,12],[18,8],[25,10],80),
        sampleBezier([38,18],[40,24],[41,32],[39,40],80),
        sampleBezier([39,40],[36,47],[29,50],[21,48],80)
      ],

      "-": [
        sampleBezier([12,30],[20,29],[30,29],[38,30],60)
      ]
    };

    function drawPath(points, ox, oy, cb) {
      let i = 0;
      function step() {
        if (i >= points.length - 1) {
          cb && cb();
          return;
        }
        const [x1, y1] = points[i];
        const [x2, y2] = points[i + 1];

        const jx = (Math.random() - 0.5) * 1.2;
        const jy = (Math.random() - 0.5) * 1.2;

        ctx.beginPath();
        ctx.moveTo(x1 + ox, y1 + oy);
        ctx.lineTo(x2 + ox + jx, y2 + oy + jy);
        ctx.stroke();

        i++;
        requestAnimationFrame(step);
      }
      step();
    }

    function drawDigit(digit, ox, oy, cb) {
      const paths = digitPaths[digit];
      if (!paths) {
        console.warn("Neznámý znak:", digit);
        cb && cb();
        return;
      }
      let p = 0;
      function next() {
        if (p >= paths.length) {
          cb && cb();
          return;
        }
        drawPath(paths[p], ox, oy, next);
        p++;
      }
      next();
    }

    function drawNumber(num, startX, startY, cb) {
      const chars = String(num).split("");
      let idx = 0;
      function nextChar() {
        if (idx >= chars.length) {
          cb && cb();
          return;
        }
        const ch = chars[idx];
        const x = startX + idx * 70;
        drawDigit(ch, x, startY, () => {
          idx++;
          nextChar();
        });
      }
      nextChar();
    }

    function getExampleFromLocalStorage() {
      const a = parseInt(localStorage.getItem("exA"), 10);
      const b = parseInt(localStorage.getItem("exB"), 10);
      const op = localStorage.getItem("exOp");
      if (Number.isNaN(a) || Number.isNaN(b) || !op) return null;
      let result;
      switch (op) {
        case "+": result = a + b; break;
        case "-": result = a - b; break;
        case "*": result = a * b; break;
        default: return null;
      }
      return { a, b, op, result };
    }

    window.addEventListener("load", () => {
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const ex = getExampleFromLocalStorage();
      const infoEl = document.getElementById("info");

      let toDraw = 8;
      if (ex) {
        infoEl.textContent = `${ex.a} ${ex.op} ${ex.b} = ${ex.result}`;
        toDraw = ex.result;
      } else {
        infoEl.textContent = "Ukázka kreslení čísla (nenalezen příklad v localStorage).";
      }

      drawNumber(toDraw, 260, 150, () => {});
    });
  </script>
</body>
</html>
