<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Ukázka příkladu</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    #board {
      width: 90vw;
      max-width: 700px;
      height: 45vw;
      max-height: 350px;
      background: #000;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <canvas id="board"></canvas>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#ffffff";

    // ---------------------------------------------------------
    // 1) PEVNÉ NASTAVENÍ VELIKOSTÍ (TADY TO MŮŽEŠ UPRAVIT)
    // ---------------------------------------------------------
    const DIGIT_WIDTH = 40;   // ← TADY UPRAVÍŠ ŠÍŘKU ČÍSLICE
    const DIGIT_SPACING = 6;  // ← TADY UPRAVÍŠ MEZERU MEZI ČÍSLY
    const SCALE = 4;          // ← TADY UPRAVÍŠ CELKOVOU VELIKOST ČÍSEL
    ctx.lineWidth = 8;        // ← TADY UPRAVÍŠ TLOUŠŤKU KŘÍDY
    // ---------------------------------------------------------

    function sampleBezier(p0, p1, p2, p3, samples = 120) {
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const mt = 1 - t;
        const x =
          mt*mt*mt*p0[0] +
          3*mt*mt*t*p1[0] +
          3*mt*t*t*p2[0] +
          t*t*t*p3[0];
        const y =
          mt*mt*mt*p0[1] +
          3*mt*mt*t*p1[1] +
          3*mt*t*t*p2[1] +
          t*t*t*p3[1];
        pts.push([x, y]);
      }
      return pts;
    }

    // ---------------------------------------------------------
    // 2) NOVÉ TVARY 1 A 6 (TVOJE VERZE)
    // ---------------------------------------------------------
    const digitPaths = {

      // 1 = dlouhá šikmá čára zleva dole doprava nahoru
      "1": [
        sampleBezier(
          [10, 45],
          [18, 30],
          [28, 18],
          [40, 5],
          140
        )
      ],

      // 6 = obrácená 9, uzavřené bříško
      "6": [
        sampleBezier([32,10],[28,5],[22,5],[18,12],80),
        sampleBezier([18,12],[10,22],[10,35],[18,42],80),
        sampleBezier([18,42],[26,48],[34,46],[38,38],80),
        sampleBezier([38,38],[40,30],[36,22],[28,20],80)
      ],

      // ostatní číslice nechávám původní (můžeš kdykoli říct a upravíme)
      "0": [
        sampleBezier([25,5],[40,5],[45,20],[45,25],80),
        sampleBezier([45,25],[45,35],[35,45],[25,45],80),
        sampleBezier([25,45],[10,45],[5,30],[5,25],80),
        sampleBezier([5,25],[5,15],[15,5],[25,5],80)
      ],
      "2": [
        sampleBezier([10,20],[15,8],[30,5],[40,12],120),
        sampleBezier([40,12],[45,20],[38,28],[25,33],120),
        sampleBezier([25,33],[15,37],[10,42],[45,42],80)
      ],
      "3": [
        sampleBezier([12,15],[20,7],[30,5],[38,10],80),
        sampleBezier([38,10],[44,15],[42,23],[32,26],80),
        sampleBezier([32,26],[42,29],[45,37],[40,43],80),
        sampleBezier([40,43],[33,48],[23,48],[15,43],80)
      ],
      "4": [
        sampleBezier([35,5],[35,20],[35,30],[35,45],120),
        sampleBezier([10,25],[22,23],[30,23],[35,25],80),
        sampleBezier([10,5],[10,15],[10,20],[10,25],80)
      ],
      "5": [
        sampleBezier([40,8],[25,5],[15,5],[10,8],80),
        sampleBezier([10,8],[8,15],[8,20],[10,23],60),
        sampleBezier([10,23],[20,22],[30,23],[38,27],80),
        sampleBezier([38,27],[45,32],[42,42],[34,46],80),
        sampleBezier([34,46],[25,49],[17,47],[11,42],80)
      ],
      "7": [
        sampleBezier([8,10],[25,7],[35,7],[42,8],80),
        sampleBezier([42,8],[35,20],[28,32],[20,45],120)
      ],
      "8": [
        sampleBezier([25,10],[32,8],[38,12],[38,18],80),
        sampleBezier([38,18],[38,24],[32,28],[25,29],80),
        sampleBezier([25,29],[18,28],[12,24],[12,18],80),
        sampleBezier([12,18],[12,12],[18,8],[25,10],80),
        sampleBezier([25,29],[33,30],[39,35],[39,41],80),
        sampleBezier([39,41],[39,47],[33,50],[25,50],80),
        sampleBezier([25,50],[17,50],[11,47],[11,41],80),
        sampleBezier([11,41],[11,35],[17,30],[25,29],80)
      ],
      "9": [
        sampleBezier([25,10],[32,8],[38,12],[38,18],80),
        sampleBezier([38,18],[38,24],[32,28],[25,29],80),
        sampleBezier([25,29],[18,28],[12,24],[12,18],80),
        sampleBezier([12,18],[12,12],[18,8],[25,10],80),
        sampleBezier([38,18],[40,24],[41,32],[39,40],80),
        sampleBezier([39,40],[36,47],[29,50],[21,48],80)
      ],
      "-": [
        sampleBezier([12,30],[20,29],[30,29],[38,30],60)
      ]
    };

    // ---------------------------------------------------------
    // 3) KRESLENÍ S PEVNÝM SPACINGEM
    // ---------------------------------------------------------
    function drawPath(points, ox, oy, scale, cb) {
      let i = 0;
      function step() {
        if (i >= points.length - 1) {
          cb && cb();
          return;
        }
        const [x1, y1] = points[i];
        const [x2, y2] = points[i + 1];

        ctx.beginPath();
        ctx.moveTo(x1 * scale + ox, y1 * scale + oy);
        ctx.lineTo(x2 * scale + ox, y2 * scale + oy);
        ctx.stroke();

        i++;
        requestAnimationFrame(step);
      }
      step();
    }

    function drawDigit(digit, ox, oy, scale, cb) {
      const paths = digitPaths[digit];
      if (!paths) { cb && cb(); return; }
      let p = 0;
      function next() {
        if (p >= paths.length) { cb && cb(); return; }
        drawPath(paths[p], ox, oy, scale, next);
        p++;
      }
      next();
    }

    function drawNumberFixed(num) {
      const str = String(num);
      const totalWidth = str.length * (DIGIT_WIDTH + DIGIT_SPACING);
      const startX = (canvas.width - totalWidth) / 2;
      const startY = canvas.height * 0.2;

      let x = startX;
      let i = 0;

      function next() {
        if (i >= str.length) return;
        drawDigit(str[i], x, startY, SCALE, () => {
          x += DIGIT_WIDTH + DIGIT_SPACING;
          i++;
          next();
        });
      }
      next();
    }

    // TEST
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawNumberFixed(-10000);

  </script>

</body>
</html>
