<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Ukázka příkladu</title>
<style>
body {
  background: #222;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

#exampleCanvas {
  background: #000;
  border: 4px solid #333;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  background: #4caf50;
  color: white;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 20px;
  cursor: pointer;
  margin-top: 20px;
}
button:hover {
  background: #45a049;
}
</style>
</head>

<body>

<h1>Ukázka příkladu</h1>
<button onclick="history.back()">Zpět</button>

<canvas id="exampleCanvas" width="600" height="300"></canvas>

<script>
// --------------------------------------------------
// 1) Načtení příkladu z localStorage
// --------------------------------------------------
const a = Number(localStorage.getItem("exA"));
const b = Number(localStorage.getItem("exB"));
const op = localStorage.getItem("exOp");
const result = eval(`${a}${op}${b}`);

const canvas = document.getElementById("exampleCanvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 4;
ctx.strokeStyle = "#fff";
ctx.lineCap = "round";

// --------------------------------------------------
// 2) Křídový noise efekt
// --------------------------------------------------
function chalkNoise(x, y) {
  if (Math.random() < 0.2) {
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(x + (Math.random()*4-2), y + (Math.random()*4-2), 2, 2);
  }
}

// --------------------------------------------------
// 3) Animované kreslení čáry
// --------------------------------------------------
function drawPathAnimated(points, offsetX, offsetY, callback) {
  const steps = points.length - 1;
  let i = 0;

  function step() {
    const [x1, y1] = points[i];
    const [x2, y2] = points[i + 1];

    // drobný jitter, ať to není robot
    const jx = (Math.random() - 0.5) * 1.2;
    const jy = (Math.random() - 0.5) * 1.2;

    ctx.beginPath();
    ctx.moveTo(x1 + offsetX, y1 + offsetY);
    ctx.lineTo(x2 + offsetX + jx, y2 + offsetY + jy);
    ctx.stroke();

    // chalk noise
    if (Math.random() < 0.3) {
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(
        x2 + offsetX + (Math.random() * 4 - 2),
        y2 + offsetY + (Math.random() * 4 - 2),
        2,
        2
      );
    }

    i++;
    if (i < steps) {
      requestAnimationFrame(step);
    } else {
      callback && callback();
    }
  }

  if (steps > 0) step();
  else callback && callback();
}
// --------------------------------------------------
// 4) Definice tahů číslic (0–9)
// --------------------------------------------------
// Každé číslo: pole tahů, každý tah = pole bodů [x, y] v lokálním boxu 0–50
const digitPaths = {
  "0": [
    [
      [25, 5], [32, 6], [38, 9], [42, 14], [45, 22],
      [45, 28], [42, 36], [38, 41], [32, 44], [25, 45],
      [18, 44], [12, 41], [8, 36], [5, 28], [5, 22],
      [8, 14], [12, 9], [18, 6], [25, 5]
    ]
  ],

  "1": [
    [
      [18, 12], [24, 6], [26, 5], [27, 5], [27, 45]
    ],
    [
      [18, 45], [34, 45]
    ]
  ],

  "2": [
    [
      [8, 15], [14, 9], [22, 6], [30, 5], [37, 7],
      [42, 11], [44, 17], [42, 23], [36, 28], [28, 32],
      [20, 36], [12, 40], [8, 44], [45, 44]
    ]
  ],

  "3": [
    [
      [10, 10], [18, 6], [26, 5], [34, 7], [40, 12],
      [41, 18], [38, 23], [32, 26], [26, 27]
    ],
    [
      [26, 27], [32, 28], [38, 31], [41, 36],
      [40, 42], [34, 46], [26, 47], [18, 45], [10, 40]
    ]
  ],

  "4": [
    [
      [34, 5], [34, 45]
    ],
    [
      [10, 25], [34, 25]
    ],
    [
      [10, 5], [10, 25]
    ]
  ],

  "5": [
    [
      [40, 6], [15, 6], [10, 7], [9, 18]
    ],
    [
      [9, 18], [20, 18], [30, 19], [38, 23],
      [41, 30], [39, 37], [33, 42], [25, 45],
      [17, 44], [11, 40]
    ]
  ],

  "6": [
    [
      [35, 8], [28, 5], [20, 6], [14, 11],
      [10, 18], [9, 26], [10, 34], [14, 40],
      [20, 44], [27, 45], [34, 42], [38, 36],
      [39, 30], [36, 25], [30, 22], [22, 22],
      [16, 25]
    ]
  ],

  "7": [
    [
      [8, 7], [42, 7]
    ],
    [
      [42, 7], [20, 45]
    ]
  ],

  "8": [
    [
      [25, 8], [31, 9], [36, 12], [38, 17],
      [36, 22], [31, 25], [25, 26], [19, 25],
      [14, 22], [12, 17], [14, 12], [19, 9], [25, 8]
    ],
    [
      [25, 26], [31, 27], [36, 30], [38, 35],
      [36, 40], [31, 43], [25, 44], [19, 43],
      [14, 40], [12, 35], [14, 30], [19, 27], [25, 26]
    ]
  ],

  "9": [
    [
      [25, 8], [31, 9], [36, 12], [38, 17],
      [36, 22], [31, 25], [25, 26], [19, 25],
      [14, 22], [12, 17], [14, 12], [19, 9], [25, 8]
    ],
    [
      [36, 22], [38, 28], [39, 35], [36, 41],
      [30, 45], [22, 47], [16, 45]
    ]
  ],

  "-": [
    [
      [10, 25], [40, 25]
    ]
  ]
};


// --------------------------------------------------
// 5) Kreslení jedné číslice
// --------------------------------------------------
function drawDigit(digit, offsetX, offsetY, callback) {
  const paths = digitPaths[digit];
  if (!paths) {
    console.warn("Neznámý znak:", digit);
    callback && callback();
    return;
  }

  let pathIndex = 0;

  function nextPath() {
    if (pathIndex >= paths.length) {
      callback && callback();
      return;
    }
    const pts = paths[pathIndex];
    pathIndex++;
    drawPathAnimated(pts, offsetX, offsetY, nextPath);
  }

  nextPath();
}

function drawNumber(num, startX, startY, callback) {
  const chars = String(num).split("");
  let index = 0;

  function nextChar() {
    if (index >= chars.length) {
      callback && callback();
      return;
    }
    const ch = chars[index];
    const x = startX + index * 60;
    drawDigit(ch, x, startY, () => {
      index++;
      nextChar();
    });
  }

  nextChar();
}

// --------------------------------------------------
// 6) Kreslení celého čísla (např. 12)
// --------------------------------------------------
function drawNumber(num, startX, startY, callback) {
  const digits = String(num).split("");
  let index = 0;

  function nextDigit() {
    if (index >= digits.length) {
      callback && callback();
      return;
    }
    drawDigit(digits[index], startX + index * 60, startY, () => {
      index++;
      nextDigit();
    });
  }
  nextDigit();
}

// --------------------------------------------------
// 7) Animace mazání tabule
// --------------------------------------------------
function eraseBoard(callback) {
  let alpha = 0;

  function fade() {
    alpha += 0.05;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if (alpha < 1) requestAnimationFrame(fade);
    else callback && callback();
  }
  fade();
}

// --------------------------------------------------
// 8) Hlavní loop animace
// --------------------------------------------------
function startLoop() {
  function cycle() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawNumber(result, 250, 120, () => {
      setTimeout(() => {
        eraseBoard(() => {
          setTimeout(cycle, 300);
        });
      }, 5000);
    });
  }
  cycle();
}

startLoop();
</script>

</body>
</html>
