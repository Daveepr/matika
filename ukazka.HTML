<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Ukázka příkladu</title>
<style>
body {
  background: #222;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

#exampleCanvas {
  background: #000;
  border: 4px solid #333;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  background: #4caf50;
  color: white;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 20px;
  cursor: pointer;
  margin-top: 20px;
}
button:hover {
  background: #45a049;
}
</style>
</head>

<body>

<h1>Ukázka příkladu</h1>
<button onclick="history.back()">Zpět</button>

<canvas id="exampleCanvas" width="600" height="300"></canvas>

<script>
// --------------------------------------------------
// 1) Načtení příkladu z localStorage
// --------------------------------------------------
const a = Number(localStorage.getItem("exA"));
const b = Number(localStorage.getItem("exB"));
const op = localStorage.getItem("exOp");
const result = eval(`${a}${op}${b}`);

const canvas = document.getElementById("exampleCanvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 4;
ctx.strokeStyle = "#fff";
ctx.lineCap = "round";

// --------------------------------------------------
// 2) Křídový noise efekt
// --------------------------------------------------
function chalkNoise(x, y) {
  if (Math.random() < 0.2) {
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(x + (Math.random()*4-2), y + (Math.random()*4-2), 2, 2);
  }
}

// --------------------------------------------------
// 3) Animované kreslení čáry
// --------------------------------------------------
function drawLineAnimated(from, to, callback) {
  const steps = 40;
  let step = 0;

  const dx = (to[0] - from[0]) / steps;
  const dy = (to[1] - from[1]) / steps;

  function drawStep() {
    const x1 = from[0] + dx * step;
    const y1 = from[1] + dy * step;
    const x2 = from[0] + dx * (step + 1);
    const y2 = from[1] + dy * (step + 1);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    chalkNoise(x2, y2);

    step++;
    if (step < steps) requestAnimationFrame(drawStep);
    else callback && callback();
  }
  drawStep();
}

// --------------------------------------------------
// 4) Definice tahů číslic (0–9)
// --------------------------------------------------
const digitStrokes = {
  "0": [
    { from: [5,5], to: [45,5] },
    { from: [45,5], to: [45,45] },
    { from: [45,45], to: [5,45] },
    { from: [5,45], to: [5,5] }
  ],
  "1": [
    { from: [25,5], to: [25,45] }
  ],
  "2": [
    { from: [5,10], to: [45,10] },
    { from: [45,10], to: [5,45] },
    { from: [5,45], to: [45,45] }
  ],
  "3": [
    { from: [5,10], to: [45,10] },
    { from: [45,10], to: [45,25] },
    { from: [45,25], to: [5,25] },
    { from: [45,25], to: [45,45] },
    { from: [45,45], to: [5,45] }
  ],
  "4": [
    { from: [5,5], to: [5,25] },
    { from: [5,25], to: [45,25] },
    { from: [45,5], to: [45,45] }
  ],
  "5": [
    { from: [45,5], to: [5,5] },
    { from: [5,5], to: [5,25] },
    { from: [5,25], to: [45,25] },
    { from: [45,25], to: [45,45] },
    { from: [45,45], to: [5,45] }
  ],
  "6": [
    { from: [45,5], to: [5,25] },
    { from: [5,25], to: [5,45] },
    { from: [5,45], to: [45,45] },
    { from: [45,45], to: [45,25] },
    { from: [45,25], to: [5,25] }
  ],
  "7": [
    { from: [5,5], to: [45,5] },
    { from: [45,5], to: [5,45] }
  ],
  "8": [
    { from: [25,5], to: [45,25] },
    { from: [45,25], to: [25,45] },
    { from: [25,45], to: [5,25] },
    { from: [5,25], to: [25,5] }
  ],
  "9": [
    { from: [5,45], to: [45,25] },
    { from: [45,25], to: [45,5] },
    { from: [45,5], to: [5,5] },
    { from: [5,5], to: [5,25] },
    { from: [5,25], to: [45,25] }
  ]
};

// --------------------------------------------------
// 5) Kreslení jedné číslice
// --------------------------------------------------
function drawDigit(digit, offsetX, offsetY, callback) {
  const strokes = digitStrokes[digit];
  let i = 0;

  function next() {
    if (i >= strokes.length) {
      callback && callback();
      return;
    }
    const s = strokes[i];
    drawLineAnimated(
      [s.from[0] + offsetX, s.from[1] + offsetY],
      [s.to[0] + offsetX, s.to[1] + offsetY],
      () => { i++; next(); }
    );
  }
  next();
}

// --------------------------------------------------
// 6) Kreslení celého čísla (např. 12)
// --------------------------------------------------
function drawNumber(num, startX, startY, callback) {
  const digits = String(num).split("");
  let index = 0;

  function nextDigit() {
    if (index >= digits.length) {
      callback && callback();
      return;
    }
    drawDigit(digits[index], startX + index * 60, startY, () => {
      index++;
      nextDigit();
    });
  }
  nextDigit();
}

// --------------------------------------------------
// 7) Animace mazání tabule
// --------------------------------------------------
function eraseBoard(callback) {
  let alpha = 0;

  function fade() {
    alpha += 0.05;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if (alpha < 1) requestAnimationFrame(fade);
    else callback && callback();
  }
  fade();
}

// --------------------------------------------------
// 8) Hlavní loop animace
// --------------------------------------------------
function startLoop() {
  function cycle() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawNumber(result, 250, 120, () => {
      setTimeout(() => {
        eraseBoard(() => {
          setTimeout(cycle, 300);
        });
      }, 5000);
    });
  }
  cycle();
}

startLoop();
</script>

</body>
</html>
